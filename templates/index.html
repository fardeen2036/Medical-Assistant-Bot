<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Healthcare Assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet"/>
  <style>
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
      position: relative;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 8px 20px rgba(0, 255, 255, 0.2);
    }
    .glass-card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 12px 25px rgba(0, 255, 255, 0.4);
    }
    .btn-glow {
      background: linear-gradient(90deg, #00f5a0, #00d9f5);
      color: white;
      border: none;
      box-shadow: 0 0 12px #00f5a0;
      transition: box-shadow 0.3s ease-in-out;
    }
    .btn-glow:hover {
      box-shadow: 0 0 18px #00f5a0, 0 0 25px #00d9f5;
      transform: scale(1.05);
    }
    input.form-control, textarea.form-control {
      background-color: rgba(255, 255, 255, 0.1);
      border: none;
      color: white;
      backdrop-filter: blur(5px);
    }
    h1 {
      text-shadow: 0 0 10px cyan;
    }
    #particles-js {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    .typing {
      font-style: italic;
      opacity: 0.8;
      font-size: 0.9em;
    }
    #chatReply {
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="particles-js"></div>

  <div class="container py-5">
    <h1 class="text-center mb-4" data-aos="zoom-in">Healthcare Assistant</h1>

    <div class="glass-card p-4 mb-4" data-aos="fade-up">
      <h4>Chat with Assistant</h4>
      <textarea id="chatInput" class="form-control mb-2" placeholder="Describe your symptoms or condition..."></textarea>
      <button onclick="chatWithAssistant()" class="btn btn-glow">Ask</button>
      <p class="typing" id="loadingText" style="display: none;">Thinking...</p>
      <div id="chatReply" class="mt-3"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    AOS.init({ duration: 1000, once: true });

    async function chatWithAssistant() {
      const input = document.getElementById("chatInput");
      const replyDiv = document.getElementById("chatReply");
      const loadingText = document.getElementById("loadingText");

      const message = input.value.trim();
      if (!message) return;

      loadingText.style.display = "block";
      replyDiv.innerText = "";

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });

        const data = await res.json();
        replyDiv.innerText = data.reply || "❌ Sorry, something went wrong.";
      } catch (err) {
        replyDiv.innerText = "⚠️ Could not connect to the assistant.";
      } finally {
        loadingText.style.display = "none";
      }
    }

    particlesJS("particles-js", {
      particles: {
        number: { value: 80 },
        color: { value: "#00f5a0" },
        shape: { type: "circle" },
        opacity: { value: 0.5 },
        size: { value: 3 },
        line_linked: {
          enable: true,
          distance: 150,
          color: "#00d9f5",
          opacity: 0.4,
          width: 1,
        },
        move: { enable: true, speed: 4 },
      },
      interactivity: {
        detect_on: "canvas",
        events: {
          onhover: { enable: true, mode: "repulse" },
          onclick: { enable: true, mode: "push" },
          resize: true,
        },
        modes: {
          repulse: { distance: 100 },
          push: { particles_nb: 4 },
        },
      },
      retina_detect: true,
    });
  </script>
</body>
</html>
